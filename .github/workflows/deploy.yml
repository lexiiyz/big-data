name: Deploy to IDCloudHost VPS

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}    
          username: ${{ secrets.VPS_USERNAME }} 
          password: ${{ secrets.VPS_PASSWORD }} 
          # key: ${{ secrets.VPS_SSH_KEY }}     
          script: |
            # Pindah ke folder project di VPS (Sesuaikan path-nya!)
            # Misalnya jika kamu taruh project di /var/www/bigdata
            cd /root/bigdata || exit
            
            # Tarik kode terbaru dari GitHub
            git pull origin main
            
            # Build ulang dan restart container twitter_scraper tanpa mengganggu service lain
            docker compose up -d --build twitter_scraper
            
            echo "Deployment Berhasil! 🚀"
