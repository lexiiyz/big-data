version: '3.8'

volumes:
  mongo_data:
  postgres_data:
  n8n_data:
  metabase_data:

networks:
  bigdata_net:
    driver: bridge

services:
  # 1. Data Lake (Raw Storage)
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-bigdata123}
    volumes:
      - mongo_data:/data/db
    networks:
      - bigdata_net

  # 2. Data Warehouse (Structured Storage - Untuk Nanti)
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigdata123}
      POSTGRES_DB: sentiment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bigdata_net

  # 3. Automation Engine (The Orchestrator)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=sentiment_db
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-bigdata123}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - bigdata_net
    depends_on:
      - postgres

  # 4. Visualization
  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: sentiment_db
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-bigdata123}
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase.db
    networks:
      - bigdata_net
    depends_on:
      - postgres
    
  # 5. Twitter Scraper Microservice
  twitter_scraper:
    build: ./scraper
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      CDP_URL: "http://host.docker.internal:9222"
      MONGO_URI: "mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-bigdata123}@mongodb:27017"
    volumes:
      - ./scraper:/app
    networks:
      - bigdata_net
    depends_on:
      - mongodb

  # 6. MongoDB GUI
  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-bigdata123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-bigdata123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER:-user}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-password}
    networks:
      - bigdata_net
    depends_on:
      - mongodb